<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axon Servo Programmer Icon</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 106, 106, 0.26), transparent 28%),
          linear-gradient(180deg, #15171c 0%, #090b0e 100%);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .icon {
        position: relative;
        width: 832px;
        height: 832px;
        border-radius: 188px;
        background:
          linear-gradient(145deg, rgba(255, 101, 101, 0.28), transparent 30%),
          linear-gradient(180deg, #1a1e24 0%, #0d1014 100%);
        border: 10px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 42px 120px rgba(0, 0, 0, 0.48),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .accent {
        position: absolute;
        inset: 74px 74px auto 74px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ec4040 0%, #ff6a6a 100%);
        box-shadow: 0 0 40px rgba(236, 64, 64, 0.48);
      }

      .mark {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }

      .a-wrap {
        position: relative;
        width: 360px;
        height: 408px;
      }

      .leg {
        position: absolute;
        bottom: 36px;
        width: 74px;
        height: 320px;
        border-radius: 40px;
        background: linear-gradient(180deg, #ffffff 0%, #d8dce2 100%);
      }

      .leg.left {
        left: 74px;
        transform: rotate(23deg);
        transform-origin: bottom center;
      }

      .leg.right {
        right: 74px;
        transform: rotate(-23deg);
        transform-origin: bottom center;
      }

      .crossbar {
        position: absolute;
        left: 88px;
        right: 88px;
        top: 208px;
        height: 48px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ec4040 0%, #ff6a6a 100%);
        box-shadow: 0 16px 38px rgba(236, 64, 64, 0.35);
      }

      .core {
        position: absolute;
        left: 50%;
        top: 114px;
        width: 112px;
        height: 188px;
        transform: translateX(-50%);
        border-radius: 56px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(214, 219, 226, 0.92));
      }

      .label {
        position: absolute;
        left: 92px;
        right: 92px;
        bottom: 74px;
        text-align: center;
        font-size: 44px;
        font-weight: 700;
        letter-spacing: 0;
        color: #dce1e8;
      }
    </style>
  </head>
  <body>
    <div class="icon" aria-label="Axon Servo Programmer">
      <div class="accent"></div>
      <div class="mark">
        <div class="a-wrap">
          <div class="leg left"></div>
          <div class="leg right"></div>
          <div class="core"></div>
          <div class="crossbar"></div>
        </div>
      </div>
      <div class="label">AXON</div>
    </div>
  </body>
</html>
