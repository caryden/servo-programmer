name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest    # Linux x64
          - macos-latest     # macOS arm64 (M-series)
          - windows-latest   # Windows x64
        # macos-13 (Intel Mac x64) is intentionally omitted — the
        # free runner image was deprecated and our plan can no longer
        # schedule it. Intel Mac users can build from source until we
        # find a replacement runner, or run the arm64 binary via
        # Rosetta once Bun ships arm64-on-Intel support (unlikely).
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-hid is a native addon. On Linux it needs libudev-dev to
      # build. macOS and Windows ship the required headers via Xcode
      # CLI and MSVC which are pre-installed on the GitHub runners.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
