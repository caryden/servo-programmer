name: Release

# Builds cross-platform `axon` binaries and publishes them as a
# GitHub Release whenever a `v*` tag is pushed. Each runner builds
# the binary natively because node-hid is a C++ addon — we cannot
# cross-compile it from one runner to another.
#
# To cut a release, bump axon/package.json version, tag, and push:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The workflow_dispatch trigger lets you manually re-run a build
# against a tag from the Actions UI without cutting a new tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0). Leave blank to use HEAD.'
        required: false

permissions:
  contents: write    # needed to create releases and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            artifact: axon-linux-x64
            ext: ''
            # linux-arm64 uses a public-larger-runner image that not
            # every GH plan has enabled. We still try to build it,
            # but a missing runner shouldn't block the rest of the
            # release — the continue-on-error below lets the other
            # four platforms ship even if this one fails.
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bun_target: bun-linux-arm64
            artifact: axon-linux-arm64
            ext: ''
            allow_failure: true
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            artifact: axon-darwin-arm64
            ext: ''
          - os: macos-13
            target: darwin-x64
            bun_target: bun-darwin-x64
            artifact: axon-darwin-x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
            artifact: axon-windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install dependencies
        working-directory: axon
        run: bun install --frozen-lockfile

      - name: Sanity — test + typecheck + lint
        working-directory: axon
        run: |
          bun run check
          bun run typecheck
          bun test

      - name: Embed firmware
        working-directory: axon
        run: bun run embed-sfw

      # `bun build --compile` produces a single executable that
      # bundles the Bun runtime + our source. The --target flag is
      # redundant on a matching host (it would let Bun cross-compile
      # the runtime, but NOT the native node-hid .node addon —
      # that's the reason we build per-runner in the first place).
      # We pass --target anyway so a mis-configured matrix (wrong
      # os/target pair) fails loudly at build time instead of
      # shipping a binary with a wrong-arch .node inside.
      - name: Build standalone binary
        working-directory: axon
        shell: bash
        run: |
          mkdir -p dist
          bun build \
            --compile \
            --target=${{ matrix.bun_target }} \
            --outfile=dist/${{ matrix.artifact }}${{ matrix.ext }} \
            src/cli.ts

      - name: Smoke test the binary (non-Windows)
        if: runner.os != 'Windows'
        working-directory: axon
        run: |
          ./dist/${{ matrix.artifact }} --version || true
          ./dist/${{ matrix.artifact }} --help || true

      - name: Smoke test the binary (Windows)
        if: runner.os == 'Windows'
        working-directory: axon
        shell: pwsh
        run: |
          .\dist\${{ matrix.artifact }}.exe --version
          .\dist\${{ matrix.artifact }}.exe --help

      - name: Compute SHA256
        working-directory: axon/dist
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            shasum -a 256 ${{ matrix.artifact }}${{ matrix.ext }} > ${{ matrix.artifact }}${{ matrix.ext }}.sha256
          elif [ "$RUNNER_OS" = "Linux" ]; then
            sha256sum ${{ matrix.artifact }}${{ matrix.ext }} > ${{ matrix.artifact }}${{ matrix.ext }}.sha256
          else
            # Windows: use PowerShell via bash wrapper
            powershell -Command "(Get-FileHash ${{ matrix.artifact }}${{ matrix.ext }} -Algorithm SHA256).Hash.ToLower() + '  ${{ matrix.artifact }}${{ matrix.ext }}'" > ${{ matrix.artifact }}${{ matrix.ext }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            axon/dist/${{ matrix.artifact }}${{ matrix.ext }}
            axon/dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 30

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'axon-*' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          draft: true   # human-reviewed before publishing
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true
          body: |
            ## Install

            ### Quick install (Linux / macOS)

            ```bash
            curl -fsSL https://github.com/caryden/servo-programmer/releases/latest/download/install.sh | bash
            ```

            ### Manual download

            Pick the binary that matches your platform below, make it executable, and put it on your `$PATH`:

            | Platform          | Asset                  |
            |-------------------|------------------------|
            | Linux x64         | `axon-linux-x64`       |
            | Linux arm64       | `axon-linux-arm64`     |
            | macOS (Apple Silicon) | `axon-darwin-arm64` |
            | macOS (Intel)     | `axon-darwin-x64`      |
            | Windows x64       | `axon-windows-x64.exe` |

            Each binary is accompanied by a `.sha256` file. Verify before running:

            ```bash
            shasum -a 256 -c axon-darwin-arm64.sha256
            ```

            ### Homebrew (macOS / Linux)

            ```bash
            brew install caryden/axon/axon
            ```

            _(See [INSTALL.md](https://github.com/caryden/servo-programmer/blob/main/docs/INSTALL.md) for the full matrix including Scoop, npm, and bunx.)_
