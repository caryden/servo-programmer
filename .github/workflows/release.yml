name: Release

# Builds cross-platform `axon` binaries and publishes them as a
# GitHub Release whenever a `v*` tag is pushed. Most targets build
# natively; the Intel macOS binary is built on Apple Silicon via
# Bun's cross-target build because GitHub no longer guarantees a
# macOS 13 Intel runner on every plan.
#
# To cut a release, bump apps/cli/package.json version, tag, and push:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The workflow_dispatch trigger lets you manually re-run a build
# against a tag from the Actions UI without cutting a new tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0). Leave blank to use HEAD.'
        required: false

permissions:
  contents: write    # needed to create releases and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            artifact: axon-linux-x64
            ext: ''
            # linux-arm64 uses a public-larger-runner image that not
            # every GH plan has enabled. We still try to build it,
            # but the release job below still verifies the full asset
            # set before drafting/publishing a release. continue-on-error
            # keeps the matrix moving so we get the other artifacts and
            # an explicit "missing asset" failure instead of aborting
            # the whole workflow early.
          - os: ubuntu-24.04-arm
            target: linux-arm64
            bun_target: bun-linux-arm64
            artifact: axon-linux-arm64
            ext: ''
            allow_failure: true
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            artifact: axon-darwin-arm64
            ext: ''
          # Build the Intel macOS binary on macos-latest. The
          # release build script skips smoke-executing foreign-arch
          # binaries, so this does not require Rosetta.
          - os: macos-latest
            target: darwin-x64
            bun_target: bun-darwin-x64
            artifact: axon-darwin-x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            bun_target: bun-windows-x64
            artifact: axon-windows-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Build standalone binary
        shell: bash
        env:
          AXON_ALLOW_CROSS_TARGET: 1
        run: |
          ./scripts/build-release.sh \
            --target ${{ matrix.bun_target }} \
            --outfile apps/cli/dist/${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/cli/dist/${{ matrix.artifact }}${{ matrix.ext }}
            apps/cli/dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256
          if-no-files-found: error
          retention-days: 30

  build-desktop-macos:
    name: build desktop macos
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packaged desktop app
        run: |
          cd apps/desktop
          bun run clean
          bun run package

      - name: Normalize desktop artifact names
        shell: bash
        run: |
          mkdir -p release-desktop

          for file in apps/desktop/artifacts/stable-macos-*-AxonServoProgrammer.dmg; do
            [[ -e "$file" ]] || continue
            arch="${file#apps/desktop/artifacts/stable-macos-}"
            arch="${arch%-AxonServoProgrammer.dmg}"
            cp "$file" "release-desktop/Axon-Servo-Programmer-macos-${arch}.dmg"
          done

          for file in apps/desktop/artifacts/stable-macos-*-AxonServoProgrammer.app.tar.zst; do
            [[ -e "$file" ]] || continue
            arch="${file#apps/desktop/artifacts/stable-macos-}"
            arch="${arch%-AxonServoProgrammer.app.tar.zst}"
            cp "$file" "release-desktop/Axon-Servo-Programmer-macos-${arch}.app.tar.zst"
          done

          ls -la release-desktop/

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: release-desktop/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: release
    needs:
      - build
      - build-desktop-macos
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'axon-*' -o -name '*.sha256' -o -name 'Axon-Servo-Programmer-*' \) -exec cp {} release/ \;
          cp scripts/install.sh release/install.sh
          ls -la release/

      - name: Verify expected release assets
        shell: bash
        run: |
          expected=(
            axon-darwin-arm64
            axon-darwin-arm64.sha256
            axon-darwin-x64
            axon-darwin-x64.sha256
            axon-linux-arm64
            axon-linux-arm64.sha256
            axon-linux-x64
            axon-linux-x64.sha256
            axon-windows-x64.exe
            axon-windows-x64.exe.sha256
            Axon-Servo-Programmer-macos-arm64.dmg
            Axon-Servo-Programmer-macos-arm64.app.tar.zst
            install.sh
          )

          missing=0
          for asset in "${expected[@]}"; do
            if [[ ! -f "release/${asset}" ]]; then
              echo "error: missing release asset: ${asset}" >&2
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "error: refusing to create a release with an incomplete asset set" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true   # human-reviewed before publishing
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true
          body: |
            ## Install

            ### Quick install (Linux / macOS)

            ```bash
            curl -fsSL https://github.com/caryden/servo-programmer/releases/latest/download/install.sh | bash
            ```

            ### Manual download

            Pick the binary that matches your platform below, make it executable, and put it on your `$PATH`:

            | Platform          | Asset                  |
            |-------------------|------------------------|
            | Linux x64         | `axon-linux-x64`       |
            | Linux arm64       | `axon-linux-arm64`     |
            | macOS (Apple Silicon) | `axon-darwin-arm64` |
            | macOS (Intel)     | `axon-darwin-x64`      |
            | Windows x64       | `axon-windows-x64.exe` |

            Each binary is accompanied by a `.sha256` file. Verify before running:

            ```bash
            shasum -a 256 -c axon-darwin-arm64.sha256
            ```

            ### Notes

            - Full install matrix: [docs/INSTALL.md](https://github.com/caryden/servo-programmer/blob/main/docs/INSTALL.md)
            - Project background: [docs/the-adventure.md](https://github.com/caryden/servo-programmer/blob/main/docs/the-adventure.md)
            - Homebrew, npm, and Scoop remain planned follow-on channels; direct download and `install.sh` are the v1.0 path.

            ### Experimental desktop app (macOS)

            - Apple Silicon macOS build: `Axon-Servo-Programmer-macos-arm64.dmg`
            - Raw app bundle archive: `Axon-Servo-Programmer-macos-arm64.app.tar.zst`
            - This desktop app is still an experimental side project built with Electrobun.
            - If Gatekeeper warns on first launch, open the app via Finder with right-click → `Open`.
